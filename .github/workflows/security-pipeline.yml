name: Secure Application DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:

  # 1. BUILD + DOCKER SETUP
  build:
    name: Build Docker Environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start Docker Compose
        run: docker compose up -d --build

      - name: Wait for services to start
        run: sleep 30

      - name: Verify containers
        run: docker ps


  # 2. SAST - SEMGREP
  sast_semgrep:
    name: SAST - Semgrep Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep Scan
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/javascript \
            --error \
            --verbose \
            .


  # 3. SAST - SONARCLOUD
  sast_sonar:
    name: SAST - SonarCloud Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        with:
          args: >
            -Dsonar.qualitygate.wait=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io


  # 4. SCA - SBOM GENERATION
  sca_sbom:
    name: SCA - SBOM Generation (CycloneDX)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: full-project-sbom.json

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: full-project-sbom.json


  # 5. DAST - OWASP ZAP
  dast_zap:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Start app with docker compose
        run: docker compose up -d --build

      - name: Wait for app
        run: sleep 40

      - name: Run OWASP ZAP
        uses: zaproxy/action-baseline@v0.12.0
        continue-on-error: true
        with:
          target: http://localhost:4000
          # use a simple alphanumeric artifact name to avoid API validation issues
          artifact_name: zapscan

      - name: Debug - list potential ZAP output files
        run: |
          echo 'Listing files matching common ZAP report patterns:'
          find . -maxdepth 6 -type f \( -iname '*zap*' -o -iname '*baseline*' -o -iname '*report*' \) -print || true

      - name: Collect ZAP report and upload with safe name
        uses: actions/upload-artifact@v4
        with:
          name: zapscan
          path: |
            **/*baseline*.html
            **/*zap*.html
            **/*report*.html
            **/*baseline*.xml
            **/*zap*.xml
            **/*report*.xml

