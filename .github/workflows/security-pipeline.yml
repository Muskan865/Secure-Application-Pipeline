on:
  push:
    branches: [main]
  pull_request:

jobs:
  sast_scan:
    name: SAST - Semgrep        
    runs-on: ubuntu-latest      

    steps:                      
      - uses: actions/checkout@v4  

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep (full scan)
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --error \
            --verbose \
            .

