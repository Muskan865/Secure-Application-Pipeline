name: SCA Full Project SBOM Generation

on:
  push:
    branches:
      - main
      - sca-before-after-fixes
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate-sbom:
    name: Generate Full Project CycloneDX SBOM with Syft
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@8f4b7f2c9d3a6c1e2b5d9f0a123456789abcdef01

      - name: Generate full project SBOM
        uses: anchore/sbom-action@3b2f4c1d9a7e8c9f0b123456789abcdef1234567
        with:
          path: .
          format: cyclonedx-json
          output-file: full-project-sbom.json

      - name: Upload full project SBOM artifact
        uses: actions/upload-artifact@a1b2c3d4e5f67890123456789abcdefabcdef12
        with:
          name: full-project-sca-sbom
          path: full-project-sbom.json